<!DOCTYPE html>
<html>
<head>
<script src='//libtl.com/sdk.js' data-zone='10883658' data-sdk='show_10883658'></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Rush Battle</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 30px;
  font-size: 30px;
}

.score {
  font-size: 26px;
  margin: 10px;
}

.timer {
  font-size: 22px;
  margin: 10px;
  color: #fbbf24;
}

button {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: none;
  font-size: 22px;
  font-weight: bold;
  background: #22c55e;
  color: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  cursor: pointer;
  margin-top: 20px;
}

button:active {
  transform: scale(0.9);
}

#result {
  margin-top: 20px;
  font-size: 22px;
  color: #60a5fa;
}

.small {
  opacity: 0.7;
  margin-top: 10px;
}
</style>

</head>

<body>

<h1>⚡ Tap Rush Battle</h1>

<div class="timer">Time: <span id="time">30</span>s</div>
<div class="score">Score: <span id="score">0</span></div>

<button onclick="tap()" id="tapBtn">START</button>

<div id="result"></div>
<div class="small">Tap fast. Build combos. Survive 30 seconds.</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let score = 0;
let time = 30;
let gameStarted = false;
let combo = 0;
let timer;

function startGame() {
  score = 0;
  time = 30;
  combo = 0;
  gameStarted = true;

  document.getElementById("score").innerText = score;
  document.getElementById("time").innerText = time;
  document.getElementById("result").innerText = "";
  document.getElementById("tapBtn").innerText = "TAP!";

  timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if (time <= 0) {
      endGame();
    }
  }, 1000);
}

function tap() {
  if (!gameStarted) {
    startGame();
    return;
  }

  combo++;

  // combo multiplier system
  let add = 1;
  if (combo > 10) add = 3;
  else if (combo > 5) add = 2;

  score += add;

  document.getElementById("score").innerText = score;
}

function endGame() {
  clearInterval(timer);
  gameStarted = false;

  let rank = "";

  if (score < 30) rank = "💀 Noob";
  else if (score < 60) rank = "🟡 Average";
  else if (score < 100) rank = "🔥 Pro";
  else rank = "🏆 Legend";

  document.getElementById("result").innerText =
    "Game Over! Rank: " + rank;

  document.getElementById("tapBtn").innerText = "RESTART";
}
</script>

</body>
</html>
