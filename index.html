<!DOCTYPE html>
<html>
<head>
<script src='//libtl.com/sdk.js' data-zone='10883658' data-sdk='show_10883658'></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Rush Target Hunt</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
overflow:hidden;
}

h1{margin-top:20px;}

#gameArea{
position:relative;
width:100%;
height:60vh;
border:2px solid rgba(255,255,255,0.2);
margin-top:20px;
}

.target{
position:absolute;
width:70px;
height:70px;
border-radius:50%;
background:#22c55e;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
animation:pop 0.25s ease;
transition:transform 0.15s;
}

.target:active{
transform:scale(0.8);
}

@keyframes pop{
0%{transform:scale(0);}
80%{transform:scale(1.2);}
100%{transform:scale(1);}
}

.hitEffect{
position:absolute;
font-size:20px;
color:#22c55e;
font-weight:bold;
animation:floatUp 0.7s forwards;
pointer-events:none;
}

@keyframes floatUp{
0%{opacity:1; transform:translateY(0);}
100%{opacity:0; transform:translateY(-40px);}
}

.score{font-size:24px;margin-top:10px;}
.timer{font-size:20px;color:#fbbf24;}

button{
margin:10px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

#result{
margin-top:15px;
font-size:22px;
}

#menu{
display:none;
margin-top:15px;
}
</style>
</head>

<body>

<h1>🎯 Tap Rush: Target Hunt</h1>

<div class="timer">Time: <span id="time">30</span></div>
<div class="score">Score: <span id="score">0</span></div>

<div id="gameArea"></div>

<button onclick="startGame()">Start Game</button>

<div id="result"></div>

<div id="menu">
<button onclick="startGame()">🔁 Play Again</button>
<button onclick="stopGame()">❌ Stop</button>
<div id="adBox" style="margin-top:15px;"></div>
</div>

<script>

let tg = window.Telegram.WebApp;
tg.expand();

let score = 0
let time = 30
let gameRunning = false
let spawnSpeed = 1200
let timer

const area = document.getElementById("gameArea")

function startGame(){

score = 0
time = 30
spawnSpeed = 1200
gameRunning = true

document.getElementById("menu").style.display="none"
document.getElementById("result").innerText=""
document.getElementById("score").innerText=score
document.getElementById("time").innerText=time

spawnTarget()

timer = setInterval(()=>{
time--
document.getElementById("time").innerText=time

if(time<=0){
clearInterval(timer)
gameRunning=false
area.innerHTML=""
endGame()
}

if(spawnSpeed > 700){
spawnSpeed -= 40
}

},1000)

}

function spawnTarget(){

if(!gameRunning) return

area.innerHTML=""

let target=document.createElement("div")
target.className="target"
target.innerText="HIT"

let x=Math.random()*(area.clientWidth-70)
let y=Math.random()*(area.clientHeight-70)

target.style.left=x+"px"
target.style.top=y+"px"

target.onclick=()=>{
score+=5
document.getElementById("score").innerText=score
spawnTarget()
}

area.appendChild(target)

setTimeout(()=>{

if(!gameRunning) return
spawnTarget()

}, spawnSpeed)

}

function endGame(){

let rank=""

if(score<40) rank="💀 Beginner"
else if(score<80) rank="🟡 Skilled"
else if(score<120) rank="🔥 Pro"
else rank="🏆 Legend"

document.getElementById("result").innerText =
"⏱ Time Up!\nScore: "+score+"\nRank: "+rank

document.getElementById("menu").style.display="block"

}

function stopGame(){
gameRunning=false
clearInterval(timer)
area.innerHTML=""
document.getElementById("result").innerText="Game Ended"
document.getElementById("menu").style.display="none"
}

</script>

</body>
</html>
